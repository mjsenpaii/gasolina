<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Auth</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&family=Questrial&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    /* * ABSOLUTE MINIMALIST GOD MODE */
    :root {
      --bg: #000000;
      --text-primary: #ffffff;
      --text-secondary: #666666;
      --border-dim: #222222;
      --border-active: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Questrial', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 60px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    .header p {
      font-size: 1rem;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .field {
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .field label {
      font-family: 'Poppins', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      transition: color 0.3s ease;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border-dim);
      color: var(--text-primary);
      font-family: 'Questrial', sans-serif;
      font-size: 1.5rem;
      padding: 8px 0;
      border-radius: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .field input:focus {
      outline: none;
      border-bottom-color: var(--border-active);
    }

    .field input:focus+label,
    .field input:not(:placeholder-shown)+label {
      color: var(--text-primary);
    }

    .field input::placeholder {
      color: #2a2a2a;
    }

    /* Webkit Autofill fix for pure black */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px var(--bg) inset !important;
      -webkit-text-fill-color: var(--text-primary) !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    .actions {
      display: flex;
      gap: 16px;
      margin-top: 20px;
      align-items: center;
    }

    .btn {
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .btn-primary {
      flex: 1;
      background: var(--text-primary);
      color: var(--bg);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      height: 60px;
      border-radius: 4px;
    }

    .btn-primary:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }

    .btn-secondary {
      width: 60px;
      height: 60px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 1.25rem;
      border: 2px solid var(--border-dim);
      border-radius: 4px;
      text-decoration: none;
    }

    .btn-secondary:hover {
      border-color: var(--text-primary);
      color: var(--text-primary);
    }

    .message {
      font-family: 'Questrial', sans-serif;
      font-size: 0.9rem;
      color: #ff3333;
      min-height: 20px;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="auth-container">
    <div class="header">
      <h1>Admin</h1>
      <p>Restricted access protocol.</p>
    </div>

    <form id="adminLoginForm" class="form">
      <div class="field">
        <label for="email">Identification</label>
        <input id="email" name="email" type="email" placeholder="admin@fuwell.io" required autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Passcode</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required
          autocomplete="current-password" />
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">
          Authenticate
        </button>
        <a href="/index.html" class="btn btn-secondary" aria-label="Return to Map">
          <i class="fa-solid fa-arrow-left-long"></i>
        </a>
      </div>

      <div id="authMessage" class="message"></div>
    </form>
  </main>

  <script type="module" src="/src/presentation/admin-login.ts"></script>
</body>

</html>
